server:
  port: ${PORT:8080}

spring:
  quartz:
    properties:
      org:
        quartz:
          dataSource:
            myDS:
              driver: org.postgresql.Driver
              user: ${JDBC_USERNAME}
              password: ${JDBC_PASSWORD}
              URL: ${JDBC_URL}
          jobStore:
            class: org.quartz.impl.jdbcjobstore.JobStoreTX
            isClustered: 'true'
            driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
            dataSource: myDS
            tablePrefix: ${DB_SCHEMA:scheduler}.qrtz_
          scheduler:
            instanceName: czertainly-scheduler
            instanceId: AUTO
    jdbc:
      initialize-schema: never
    job-store-type: jdbc
  messaging:
    broker-type: ${BROKER_TYPE:RABBITMQ}
    broker-url: ${BROKER_URL:}
    # Legacy RabbitMQ connection properties (used if broker-url is not set)
    host: ${BROKER_HOST:}
    port: ${BROKER_PORT:5672}
    pool:
      max-connections: ${BROKER_POOL_MAX_CONNECTIONS:1}
      connection-idle-timeout: ${BROKER_POOL_CONNECTION_IDLE_TIMEOUT:30000}
      connection-check-interval: ${BROKER_POOL_CONNECTION_CHECK_INTERVAL:60000}
      max-sessions-per-connection: ${BROKER_POOL_MAX_SESSIONS:500}
      use-anonymous-producers: ${BROKER_POOL_USE_ANONYMOUS_PRODUCERS:true}
    # Authentication - RabbitMQ requires username/password, ServiceBus requires either username/password (SAS) or AAD
    username: ${BROKER_USERNAME:}
    password: ${BROKER_PASSWORD:}
    # Azure Active Directory (Entra) authentication for ServiceBus
    aad-auth:
      tenant-id: ${BROKER_AZURE_TENANT_ID:}
      client-id: ${BROKER_AZURE_CLIENT_ID:}
      client-secret: ${BROKER_AZURE_CLIENT_SECRET:}
    virtual-host: ${BROKER_VIRTUAL_HOST:/}
    exchange: ${BROKER_EXCHANGE:czertainly}
    routing-key:
      scheduler: ${BROKER_ROUTING_KEY_SCHEDULER:scheduler}
  jpa:
    generate-ddl: 'true'
    hibernate:
      ddl-auto: update
    properties:
      hibernate.default_schema: ${DB_SCHEMA:scheduler}
  liquibase:
    change-log: classpath:/db/migration/db.changelog-master.xml
    default-schema: ${DB_SCHEMA:scheduler}
  datasource:
    password: ${JDBC_PASSWORD}
    driver-class-name: org.postgresql.Driver
    username: ${JDBC_USERNAME}
    url: ${JDBC_URL}

management:
  endpoints:
    web:
      base-path: '/'
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
