server:
  port: ${PORT:8080}

spring:
  quartz:
    properties:
      org:
        quartz:
          dataSource:
            myDS:
              driver: org.postgresql.Driver
              user: ${JDBC_USERNAME}
              password: ${JDBC_PASSWORD}
              URL: ${JDBC_URL}
          jobStore:
            class: org.quartz.impl.jdbcjobstore.JobStoreTX
            isClustered: 'true'
            driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
            dataSource: myDS
            tablePrefix: ${DB_SCHEMA:scheduler}.qrtz_
          scheduler:
            instanceName: czertainly-scheduler
            instanceId: AUTO
    jdbc:
      initialize-schema: never
    job-store-type: jdbc
  messaging:
    name: ${BROKER_NAME:SERVICEBUS}
    broker-url: ${BROKER_URL}
    user: ${BROKER_USER}
    password: ${BROKER_PASSWORD}
    vhost: ${BROKER_VHOST:/}
    exchange: ${BROKER_EXCHANGE:czertainly}
    routing-key:
      scheduler: ${BROKER_ROUTING_KEY_SCHEDULER:scheduler}
  jpa:
    generate-ddl: 'true'
    hibernate:
      ddl-auto: update
    properties:
      hibernate.default_schema: ${DB_SCHEMA:scheduler}
  liquibase:
    change-log: classpath:/db/migration/db.changelog-master.xml
    default-schema: ${DB_SCHEMA:scheduler}
  datasource:
    password: ${JDBC_PASSWORD}
    driver-class-name: org.postgresql.Driver
    username: ${JDBC_USERNAME}
    url: ${JDBC_URL}

management:
  endpoints:
    web:
      base-path: '/'
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
